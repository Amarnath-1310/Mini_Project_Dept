# Clinical-NIDS Backend Configuration
spring.application.name=clinical-nids-backend

# Server
server.port=8080

# Database — H2 for development (switch to PostgreSQL for production)
# spring.datasource.url=jdbc:h2:mem:clinicalnids
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# PostgreSQL (production)
spring.datasource.url=jdbc:postgresql://localhost:5432/clinical_nids
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=ClinicalNIDS_SuperSecretJWTKey_2026_HospitalSecurity_AuthenticationToken_v1
app.jwt.expiration-ms=86400000

# ML Service URL
app.ml-service.url=http://localhost:8000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.clinicalnids=DEBUG
logging.level.org.springframework.security=INFO

# File Upload
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true
app.upload.dir=./uploads
